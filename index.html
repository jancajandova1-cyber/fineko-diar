<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Účetní diář – Fineko Daně</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = 'https://wvqfiqgeqzobhcrltkzi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wwhe8J8IcQiSX6Y36DXiwg_JANio2XX';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadData() {
  const { data } = await sb.from('diar_data').select('id, data');
  if (!data) return null;
  const result = {};
  data.forEach(row => { result[row.id] = row.data; });
  return result;
}

async function saveData(id, data) {
  await sb.from('diar_data').upsert({ id, data, updated_at: new Date().toISOString() });
}

const MONTHLY_FIRMS = [
  "Building Projects a.s.", "Building s.r.o.", "Building Statics s.r.o.",
  "Drbohlav Jakub, Ing.", "ECO-VEST s.r.o.", "Kovo Stoupa cz s.r.o.",
  "Krejza Václav", "MODESTIA s.r.o.", "Moc Pavel", "Nástrojárna Pňov s.r.o.",
  "Sazavatex s.r.o.", "Štál Petr, Ing.", "VF Electric s.r.o.",
];
const QUARTERLY_FIRMS = ["Dušek Jaroslav", "Janda Petr", "Jandová Jana", "Mušková Dana", "Pavlíček Dušan"];
const QUARTER_MONTHS = [4, 7, 10, 1];
const ALL_FIRMS_TAX = [...MONTHLY_FIRMS, ...QUARTERLY_FIRMS.filter(f => f !== "Mušková Dana")].sort((a, b) => a.localeCompare(b, "cs"));

const INITIAL_TASKS = [
  { id: 1, date: "2026-06-16", title: "Building Projects a.s. – připravit doklady pro kontrolu VZP", done: false, category: "účetnictví" },
  { id: 2, date: "2026-06-18", title: "Kožní lékař 12:00", done: false, category: "osobní" },
  { id: 3, date: "2026-06-25", title: "Kovo Stoupa cz s.r.o. – oprava FV pan Stoupa", done: false, category: "účetnictví" },
  { id: 4, date: "2026-06-29", title: "Štál Petr, Ing. – odhlášení zaměstnance", done: false, category: "mzdy" },
  { id: 5, date: "2026-07-01", title: "Building Projects a.s. – odhlášení zaměstnance", done: false, category: "mzdy" },
  { id: 6, date: "2026-07-10", title: "Kadeřnictví 11:00", done: false, category: "osobní" },
];

const CAT = {
  "mzdy": { bg: "#eff6ff", border: "#bfdbfe", text: "#1d4ed8", label: "Mzdy" },
  "osobní": { bg: "#fdf4ff", border: "#e9d5ff", text: "#7e22ce", label: "Osobní" },
  "účetnictví": { bg: "#f0fdf4", border: "#bbf7d0", text: "#15803d", label: "Účetnictví" },
  "daně": { bg: "#fff7ed", border: "#fed7aa", text: "#c2410c", label: "Daně" },
};

function buildPrefilled() {
  const data = {};
  [1,2,3,4,5].forEach(month => {
    const mk = `2026-${month}`;
    const md = {};
    MONTHLY_FIRMS.forEach(f => { md[`monthly-${f}`] = true; });
    md[`monthly-Building s.r.o.-SK`] = true;
    if (QUARTER_MONTHS.includes(month)) QUARTERLY_FIRMS.forEach(f => { md[`quarterly-${f}`] = true; });
    data[mk] = md;
  });
  return data;
}

const MN = ["Leden","Únor","Březen","Duben","Květen","Červen","Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];
const gm = m => MN[m-1];
const isQ = m => QUARTER_MONTHS.includes(m);
const prevMN = (m, y) => m === 1 ? `${gm(12)} ${y-1}` : `${gm(m-1)} ${y}`;

function App() {
  const today = new Date();
  const [cm, setCm] = useState(today.getMonth()+1);
  const [cy, setCy] = useState(today.getFullYear());
  const [checked, setChecked] = useState({});
  const [tasks, setTasks] = useState([]);
  const [view, setView] = useState("week");
  const [wo, setWo] = useState(0);
  const [sync, setSync] = useState("loading");
  const [showAdd, setShowAdd] = useState(false);
  const [showDone, setShowDone] = useState(false);
  const [newTask, setNewTask] = useState({ date: "", title: "", category: "účetnictví" });

  useEffect(() => {
    loadData().then(data => {
      if (data) {
        setChecked(data.checked && Object.keys(data.checked).length > 0 ? data.checked : buildPrefilled());
        setTasks(data.tasks && data.tasks.length > 0 ? data.tasks : INITIAL_TASKS);
      } else {
        setChecked(buildPrefilled());
        setTasks(INITIAL_TASKS);
      }
      setSync("ok");
    }).catch(() => {
      setChecked(buildPrefilled());
      setTasks(INITIAL_TASKS);
      setSync("ok");
    });
  }, []);

  const save = useCallback(async (c, t) => {
    setSync("saving");
    try {
      await Promise.all([saveData("checked", c), saveData("tasks", t)]);
      setSync("ok");
    } catch { setSync("error"); }
  }, []);

  const todayStr = today.toISOString().split("T")[0];
  const key = `${cy}-${cm}`;
  const mc = checked[key] || {};
  const tc = checked["tax2026"] || {};
  const taxDone = ALL_FIRMS_TAX.filter(f => tc[f]).length;

  function toggle(type, firm) {
    setChecked(prev => {
      const pm = prev[key] || {};
      const nd = { ...prev, [key]: { ...pm, [`${type}-${firm}`]: !pm[`${type}-${firm}`] } };
      save(nd, tasks);
      return nd;
    });
  }

  function toggleTax(firm) {
    setChecked(prev => {
      const pt = prev["tax2026"] || {};
      const nd = { ...prev, tax2026: { ...pt, [firm]: !pt[firm] } };
      save(nd, tasks);
      return nd;
    });
  }

  function toggleTask(id) {
    setTasks(prev => {
      const nt = prev.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save(checked, nt);
      return nt;
    });
  }

  function addTask() {
    if (!newTask.date || !newTask.title) return;
    const task = { id: Date.now(), date: newTask.date, title: newTask.title, category: newTask.category, done: false };
    setTasks(prev => {
      const nt = [...prev, task];
      save(checked, nt);
      return nt;
    });
    setNewTask({ date: "", title: "", category: "účetnictví" });
    setShowAdd(false);
  }

  function deleteTask(id) {
    setTasks(prev => {
      const nt = prev.filter(t => t.id !== id);
      save(checked, nt);
      return nt;
    });
  }

  const showQ = isQ(cm);
  const mDone = MONTHLY_FIRMS.filter(f => mc[`monthly-${f}`]).length;
  const qDone = showQ ? QUARTERLY_FIRMS.filter(f => mc[`quarterly-${f}`]).length : 0;
  const sorted = [...tasks].sort((a,b) => new Date(a.date)-new Date(b.date));

  function getWeekDays(off) {
    const d = new Date(today);
    const day = d.getDay() === 0 ? 6 : d.getDay()-1;
    d.setDate(d.getDate()-day+off*7);
    return Array.from({length:7}, (_,i) => { const dd=new Date(d); dd.setDate(d.getDate()+i); return dd; });
  }
  const wd = getWeekDays(wo);
  const wdn = ["Pondělí","Úterý","Středa","Čtvrtek","Pátek","Sobota","Neděle"];

  function getEvents(date) {
    const ds = date.toISOString().split("T")[0];
    const m = date.getMonth()+1, y = date.getFullYear();
    const ev = [];
    tasks.forEach(t => { if (t.date === ds) ev.push({type:"task",task:t}); });
    if (date.getDate() === 25) {
      const mch = checked[`${y}-${m}`] || {};
      const md2 = MONTHLY_FIRMS.filter(f => mch[`monthly-${f}`]).length;
      const sk = !!mch[`monthly-Building s.r.o.-SK`];
      const iq = isQ(m);
      const qd = iq ? QUARTERLY_FIRMS.filter(f => mch[`quarterly-${f}`]).length : 0;
      const tot = MONTHLY_FIRMS.length+1+(iq?QUARTERLY_FIRMS.length:0);
      ev.push({type:"dph",month:m,year:y,done:md2+(sk?1:0)+qd,total:tot,isQ:iq});
    }
    if (date.getDate()===30&&m===4&&y===2027) ev.push({type:"tax",done:taxDone,total:ALL_FIRMS_TAX.length});
    return ev;
  }

  const syncColor = sync==="ok"?"#16a34a":sync==="saving"?"#f59e0b":sync==="error"?"#dc2626":"#94a3b8";
  const syncText = sync==="ok"?"✓ Uloženo":sync==="saving"?"⏳ Ukládám...":sync==="error"?"⚠️ Chyba":"⏳ Načítám...";

  function FirmRow({label, done, onClick, flag}) {
    return (
      <div onClick={onClick} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:8,cursor:"pointer",background:done?"#f0fdf4":flag?"#f0f4ff":"#f8fafc",border:`1px solid ${done?"#bbf7d0":flag?"#c7d2fe":"#e2eaf2"}`,marginBottom:6}}>
        <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${done?"#16a34a":flag?"#6366f1":"#94a3b8"}`,background:done?"#16a34a":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {done&&<span style={{color:"white",fontSize:13,lineHeight:1}}>✓</span>}
        </div>
        <span style={{fontSize:14,fontWeight:500,color:done?"#15803d":flag?"#4338ca":"#1e3a5f",textDecoration:done?"line-through":"none",opacity:done?0.7:1}}>{label}</span>
        {done&&<span style={{marginLeft:"auto",fontSize:11,color:"#16a34a",fontWeight:600}}>Zpracováno ✓</span>}
      </div>
    );
  }

  function FirmList({firms, type}) {
    return (
      <div>
        {firms.map(f => <FirmRow key={f} label={f} done={!!mc[`${type}-${f}`]} onClick={()=>toggle(type,f)} />)}
        {type==="monthly"&&<FirmRow label="🇸🇰 Building s.r.o. – DPH & KH Slovensko" done={!!mc[`monthly-Building s.r.o.-SK`]} onClick={()=>toggle("monthly","Building s.r.o.-SK")} flag={true} />}
      </div>
    );
  }

  if (sync === "loading") return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16}}>
      <div style={{fontSize:32}}>⏳</div>
      <div style={{fontSize:16,color:"#64748b",fontWeight:600}}>Načítám diář...</div>
    </div>
  );

  const nb = (label, target) => (
    <button onClick={()=>setView(target)} style={{padding:"6px 12px",borderRadius:8,border:"none",cursor:"pointer",background:view===target?"white":"rgba(255,255,255,0.15)",color:view===target?"#1e3a5f":"white",fontWeight:600,fontSize:12}}>
      {label}
    </button>
  );

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",minHeight:"100vh",background:"#f0f4f8"}}>
      {/* HEADER */}
      <div style={{background:"#1e3a5f",color:"white",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>
        <div>
          <div style={{fontSize:10,letterSpacing:2,opacity:0.6,textTransform:"uppercase"}}>Fineko Daně</div>
          <div style={{fontSize:20,fontWeight:700}}>Účetní diář</div>
          <div style={{fontSize:10,marginTop:2,color:syncColor,fontWeight:600}}>{syncText}</div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
          {nb("Týden","week")}
          {nb("Měsíc","month")}
          {nb("Přehled","overview")}
          {nb("Přiznání","tax")}
          {nb("Úkoly","tasks")}
        </div>
      </div>

      {/* TÝDEN */}
      {view==="week"&&(
        <div style={{maxWidth:720,margin:"0 auto",padding:"20px 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
            <button onClick={()=>setWo(w=>w-1)} style={{width:40,height:40,borderRadius:"50%",border:"1px solid #d1d9e0",background:"white",cursor:"pointer",fontSize:18,color:"#1e3a5f"}}>‹</button>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:700,color:"#1e3a5f"}}>{wd[0].getDate()}. {gm(wd[0].getMonth()+1)} – {wd[6].getDate()}. {gm(wd[6].getMonth()+1)} {wd[6].getFullYear()}</div>
              <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{wo===0?"Tento týden":wo===1?"Příští týden":wo===-1?"Minulý týden":`${wo>0?"+":""}${wo} týdnů`}</div>
            </div>
            <button onClick={()=>setWo(w=>w+1)} style={{width:40,height:40,borderRadius:"50%",border:"1px solid #d1d9e0",background:"white",cursor:"pointer",fontSize:18,color:"#1e3a5f"}}>›</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {wd.map((date,i)=>{
              const ds=date.toISOString().split("T")[0];
              const isToday=ds===todayStr, isWe=i>=5, ev=getEvents(date);
              return (
                <div key={ds} style={{background:isToday?"#eff6ff":isWe?"#f8fafc":"white",borderRadius:12,padding:"12px 16px",border:isToday?"2px solid #1e3a5f":"1px solid #e2eaf2",opacity:isWe&&ev.length===0?0.5:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:ev.length>0?10:0}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:isToday?"#1e3a5f":isWe?"#f1f5f9":"#f8fafc",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <span style={{fontSize:14,fontWeight:700,color:isToday?"white":isWe?"#94a3b8":"#1e3a5f"}}>{date.getDate()}</span>
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:isToday?"#1e3a5f":isWe?"#94a3b8":"#1e3a5f"}}>{wdn[i]}</div>
                      <div style={{fontSize:11,color:"#94a3b8"}}>{date.getDate()}. {gm(date.getMonth()+1)}</div>
                    </div>
                    {isToday&&<span style={{marginLeft:"auto",fontSize:10,background:"#1e3a5f",color:"white",borderRadius:10,padding:"2px 8px",fontWeight:600}}>Dnes</span>}
                    {ev.length===0&&!isToday&&<span style={{marginLeft:"auto",fontSize:11,color:"#cbd5e1"}}>Volno</span>}
                  </div>
                  {ev.length>0&&(
                    <div style={{display:"flex",flexDirection:"column",gap:6,paddingLeft:46}}>
                      {ev.map((e,ei)=>{
                        if(e.type==="task"){
                          const cat=CAT[e.task.category]||CAT["účetnictví"],done=e.task.done;
                          return(
                            <div key={ei} onClick={()=>toggleTask(e.task.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,cursor:"pointer",background:done?"#f0fdf4":cat.bg,border:`1px solid ${done?"#bbf7d0":cat.border}`}}>
                              <div style={{width:18,height:18,borderRadius:5,flexShrink:0,border:`2px solid ${done?"#16a34a":cat.text}`,background:done?"#16a34a":"white",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                {done&&<span style={{color:"white",fontSize:11,lineHeight:1}}>✓</span>}
                              </div>
                              <span style={{fontSize:13,fontWeight:500,color:done?"#15803d":cat.text,textDecoration:done?"line-through":"none",opacity:done?0.7:1}}>{e.task.title}</span>
                              <span style={{marginLeft:"auto",fontSize:10,background:"white",color:cat.text,border:`1px solid ${cat.border}`,borderRadius:8,padding:"1px 6px",fontWeight:600,flexShrink:0}}>{cat.label}</span>
                            </div>
                          );
                        }
                        if(e.type==="dph"){
                          const ad=e.done===e.total;
                          return(
                            <div key={ei} onClick={()=>{setCm(e.month);setCy(e.year);setView("month");}} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,cursor:"pointer",background:ad?"#f0fdf4":"#fff7ed",border:`1px solid ${ad?"#bbf7d0":"#fed7aa"}`}}>
                              <span style={{fontSize:16}}>{ad?"✅":"📋"}</span>
                              <div style={{flex:1}}>
                                <div style={{fontSize:13,fontWeight:600,color:ad?"#15803d":"#c2410c"}}>Termín DPH & KH – {prevMN(e.month,e.year)}</div>
                                <div style={{fontSize:11,color:ad?"#16a34a":"#f59e0b",marginTop:1}}>{ad?"Vše zpracováno ✓":`${e.done}/${e.total} zpracováno – klikni pro detail`}</div>
                              </div>
                            </div>
                          );
                        }
                        if(e.type==="tax"){
                          const ad=e.done===e.total;
                          return(
                            <div key={ei} onClick={()=>setView("tax")} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,cursor:"pointer",background:ad?"#f0fdf4":"#fdf4ff",border:`1px solid ${ad?"#bbf7d0":"#e9d5ff"}`}}>
                              <span style={{fontSize:16}}>{ad?"✅":"📄"}</span>
                              <div style={{flex:1}}>
                                <div style={{fontSize:13,fontWeight:600,color:ad?"#15803d":"#7e22ce"}}>Termín daňového přiznání za rok 2026</div>
                                <div style={{fontSize:11,color:ad?"#16a34a":"#a855f7",marginTop:1}}>{ad?"Vše zpracováno ✓":`${e.done}/${e.total} zpracováno`}</div>
                              </div>
                            </div>
                          );
                        }
                        return null;
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {wo!==0&&<div style={{textAlign:"center",marginTop:16}}><button onClick={()=>setWo(0)} style={{padding:"8px 20px",borderRadius:8,border:"1px solid #1e3a5f",background:"white",color:"#1e3a5f",cursor:"pointer",fontWeight:600,fontSize:13}}>Zpět na tento týden</button></div>}
        </div>
      )}

      {/* MĚSÍC */}
      {view==="month"&&(
        <div style={{maxWidth:720,margin:"0 auto",padding:"20px 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
            <button onClick={()=>cm===1?(setCm(12),setCy(y=>y-1)):setCm(m=>m-1)} style={{width:40,height:40,borderRadius:"50%",border:"1px solid #d1d9e0",background:"white",cursor:"pointer",fontSize:18,color:"#1e3a5f"}}>‹</button>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:"#1e3a5f"}}>{gm(cm)} {cy}</div>
              <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Termín 25. {gm(cm)} – za {prevMN(cm,cy)}</div>
            </div>
            <button onClick={()=>cm===12?(setCm(1),setCy(y=>y+1)):setCm(m=>m+1)} style={{width:40,height:40,borderRadius:"50%",border:"1px solid #d1d9e0",background:"white",cursor:"pointer",fontSize:18,color:"#1e3a5f"}}>›</button>
          </div>
          <div style={{background:"white",borderRadius:14,padding:20,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",border:"1px solid #e2eaf2"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#1e3a5f"}}>📋 DPH & KH – měsíční plátci</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Termín: 25. {gm(cm)} {cy} – za {prevMN(cm,cy)}</div>
              </div>
              <div style={{background:mDone===MONTHLY_FIRMS.length?"#dcfce7":"#f1f5f9",color:mDone===MONTHLY_FIRMS.length?"#166534":"#64748b",borderRadius:20,padding:"4px 12px",fontSize:13,fontWeight:700}}>{mDone}/{MONTHLY_FIRMS.length}</div>
            </div>
            <FirmList firms={MONTHLY_FIRMS} type="monthly" />
          </div>
          {showQ&&(
            <div style={{background:"white",borderRadius:14,padding:20,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",border:"1px solid #e2eaf2"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:"#1e3a5f"}}>📋 DPH & KH – čtvrtletní plátci</div>
                  <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Termín: 25. {gm(cm)} {cy} – za {prevMN(cm,cy)}</div>
                </div>
                <div style={{background:qDone===QUARTERLY_FIRMS.length?"#dcfce7":"#f1f5f9",color:qDone===QUARTERLY_FIRMS.length?"#166534":"#64748b",borderRadius:20,padding:"4px 12px",fontSize:13,fontWeight:700}}>{qDone}/{QUARTERLY_FIRMS.length}</div>
              </div>
              <FirmList firms={QUARTERLY_FIRMS} type="quarterly" />
            </div>
          )}
          {!showQ&&<div style={{background:"#f8fafc",borderRadius:12,padding:"14px 18px",border:"1px dashed #cbd5e1",fontSize:13,color:"#64748b",textAlign:"center"}}>Čtvrtletní DPH se nezpracovává v {gm(cm)} – termíny jsou v dubnu, červenci, říjnu a lednu.</div>}
        </div>
      )}

      {/* PŘEHLED */}
      {view==="overview"&&(
        <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px"}}>
          <div style={{fontSize:18,fontWeight:700,color:"#1e3a5f",marginBottom:16}}>Přehled roku {cy}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:12}}>
            {Array.from({length:12},(_,i)=>i+1).map(month=>{
              const mk=`${cy}-${month}`,mch=checked[mk]||{};
              const md2=MONTHLY_FIRMS.filter(f=>mch[`monthly-${f}`]).length;
              const iq=isQ(month),qd=iq?QUARTERLY_FIRMS.filter(f=>mch[`quarterly-${f}`]).length:0;
              const tot=MONTHLY_FIRMS.length+(iq?QUARTERLY_FIRMS.length:0);
              const done=md2+qd,ad=done===tot;
              const isNow=month===today.getMonth()+1&&cy===today.getFullYear();
              return(
                <div key={month} onClick={()=>{setCm(month);setView("month");}} style={{background:"white",borderRadius:12,padding:16,cursor:"pointer",border:isNow?"2px solid #1e3a5f":"1px solid #e2eaf2",boxShadow:isNow?"0 2px 12px rgba(30,58,95,0.12)":"0 1px 4px rgba(0,0,0,0.06)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{fontWeight:700,color:"#1e3a5f",fontSize:15}}>{gm(month)}</div>
                    {isNow&&<span style={{fontSize:10,background:"#1e3a5f",color:"white",borderRadius:10,padding:"2px 7px",fontWeight:600}}>Nyní</span>}
                  </div>
                  <div style={{marginTop:10}}>
                    <div style={{height:6,borderRadius:3,background:"#e2eaf2",overflow:"hidden",marginBottom:8}}>
                      <div style={{height:"100%",borderRadius:3,background:ad?"#16a34a":done>0?"#f59e0b":"#e2eaf2",width:`${tot>0?(done/tot)*100:0}%`}} />
                    </div>
                    <div style={{fontSize:12,color:"#64748b"}}>{ad?<span style={{color:"#16a34a",fontWeight:700}}>✓ Vše zpracováno</span>:`${done}/${tot} zpracováno`}</div>
                    {iq&&<div style={{fontSize:11,color:"#8b5cf6",marginTop:4,fontWeight:600}}>+ čtvrtletní DPH</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* PŘIZNÁNÍ */}
      {view==="tax"&&(
        <div style={{maxWidth:720,margin:"0 auto",padding:"20px 16px"}}>
          <div style={{background:"white",borderRadius:14,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",border:"1px solid #e2eaf2"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#1e3a5f"}}>📄 Daňové přiznání za rok 2026</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Termín: 30. dubna 2027 • FO i PO (elektronické podání)</div>
              </div>
              <div style={{background:taxDone===ALL_FIRMS_TAX.length?"#dcfce7":"#f1f5f9",color:taxDone===ALL_FIRMS_TAX.length?"#166534":"#64748b",borderRadius:20,padding:"4px 12px",fontSize:13,fontWeight:700}}>{taxDone}/{ALL_FIRMS_TAX.length}</div>
            </div>
            {taxDone===ALL_FIRMS_TAX.length&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#166534",fontWeight:600}}>🎉 Všechna přiznání jsou zpracována!</div>}
            <div>
              {ALL_FIRMS_TAX.map(firm=>{
                const done=!!tc[firm];
                return(
                  <div key={firm} onClick={()=>toggleTax(firm)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:8,cursor:"pointer",background:done?"#f0fdf4":"#f8fafc",border:`1px solid ${done?"#bbf7d0":"#e2eaf2"}`,marginBottom:6}}>
                    <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${done?"#16a34a":"#94a3b8"}`,background:done?"#16a34a":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {done&&<span style={{color:"white",fontSize:13,lineHeight:1}}>✓</span>}
                    </div>
                    <span style={{fontSize:14,fontWeight:500,color:done?"#15803d":"#1e3a5f",textDecoration:done?"line-through":"none",opacity:done?0.7:1}}>{firm}</span>
                    {done&&<span style={{marginLeft:"auto",fontSize:11,color:"#16a34a",fontWeight:600}}>Zpracováno ✓</span>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ÚKOLY */}
      {view==="tasks"&&(()=>{
        const groups={};
        sorted.filter(t=>!t.done).forEach(t=>{
          const [y,m]=t.date.split("-");
          const gk=`${y}-${parseInt(m)}`;
          if(!groups[gk]) groups[gk]={year:parseInt(y),month:parseInt(m),tasks:[]};
          groups[gk].tasks.push(t);
        });
        const groupKeysSorted = Object.keys(groups).sort((a,b)=>{
          const ga=groups[a], gb=groups[b];
          return (ga.year*12+ga.month)-(gb.year*12+gb.month);
        });
        const doneSorted = sorted.filter(t=>t.done).sort((a,b)=> new Date(b.date)-new Date(a.date));
        const allDoneCount = doneSorted.length;
        return(
          <div style={{maxWidth:720,margin:"0 auto",padding:"20px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:18,fontWeight:700,color:"#1e3a5f"}}>📌 Úkoly a události</div>
              <button onClick={()=>setShowAdd(!showAdd)} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#1e3a5f",color:"white",fontWeight:600,fontSize:13,cursor:"pointer"}}>
                {showAdd?"✕ Zrušit":"+ Přidat úkol"}
              </button>
            </div>
            {showAdd&&(
              <div style={{background:"white",borderRadius:14,padding:20,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",border:"1px solid #e2eaf2"}}>
                <div style={{fontSize:14,fontWeight:700,color:"#1e3a5f",marginBottom:14}}>Nový úkol</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <div>
                    <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>Datum</div>
                    <input type="date" value={newTask.date} onChange={e=>setNewTask(p=>({...p,date:e.target.value}))} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"1px solid #e2eaf2",fontSize:14}} />
                  </div>
                  <div>
                    <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>Název</div>
                    <input type="text" value={newTask.title} onChange={e=>setNewTask(p=>({...p,title:e.target.value}))} placeholder="např. Kožní lékař 10:00" style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"1px solid #e2eaf2",fontSize:14}} />
                  </div>
                  <div>
                    <div style={{fontSize:12,color:"#64748b",marginBottom:4}}>Kategorie</div>
                    <select value={newTask.category} onChange={e=>setNewTask(p=>({...p,category:e.target.value}))} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"1px solid #e2eaf2",fontSize:14}}>
                      <option value="účetnictví">Účetnictví</option>
                      <option value="mzdy">Mzdy</option>
                      <option value="osobní">Osobní</option>
                      <option value="daně">Daně</option>
                    </select>
                  </div>
                  <button onClick={addTask} style={{padding:10,borderRadius:8,border:"none",background:"#16a34a",color:"white",fontWeight:700,fontSize:14,cursor:"pointer",marginTop:4}}>✓ Uložit úkol</button>
                </div>
              </div>
            )}
            {groupKeysSorted.length === 0 && (
              <div style={{background:"white",borderRadius:14,padding:30,textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",border:"1px solid #e2eaf2"}}>
                <div style={{fontSize:32,marginBottom:8}}>🎉</div>
                <div style={{fontSize:15,fontWeight:700,color:"#16a34a"}}>Všechny úkoly jsou hotové!</div>
                {allDoneCount > 0 && <div style={{fontSize:12,color:"#64748b",marginTop:4}}>Dokončeno: {allDoneCount} úkolů</div>}
              </div>
            )}
            {groupKeysSorted.map(gk=>{
              const {year,month,tasks:gt}=groups[gk];
              return(
                <div key={gk} style={{marginBottom:20}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <div style={{fontSize:16,fontWeight:700,color:"#1e3a5f"}}>📅 {gm(month)} {year}</div>
                    <div style={{fontSize:11,fontWeight:600,borderRadius:10,padding:"2px 10px",background:"#fff7ed",color:"#c2410c"}}>{gt.length} zbývá</div>
                  </div>
                  <div style={{background:"white",borderRadius:14,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",border:"1px solid #e2eaf2"}}>
                    {gt.map(task=>{
                      const cat=CAT[task.category]||CAT["účetnictví"];
                      const isPast=task.date<todayStr&&!task.done;
                      const isToday2=task.date===todayStr,done=task.done;
                      return(
                        <div key={task.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:8,background:done?"#f0fdf4":isPast?"#fff1f2":"#f8fafc",border:`1px solid ${done?"#bbf7d0":isPast?"#fecdd3":"#e2eaf2"}`,marginBottom:6}}>
                          <div onClick={()=>toggleTask(task.id)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${done?"#16a34a":isPast?"#f43f5e":"#94a3b8"}`,background:done?"#16a34a":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer"}}>
                            {done&&<span style={{color:"white",fontSize:13,lineHeight:1}}>✓</span>}
                          </div>
                          <div style={{flex:1,cursor:"pointer"}} onClick={()=>toggleTask(task.id)}>
                            <div style={{fontSize:14,fontWeight:600,color:done?"#15803d":isPast?"#be123c":"#1e3a5f",textDecoration:done?"line-through":"none",opacity:done?0.7:1}}>{task.title}</div>
                            <div style={{fontSize:11,color:done?"#16a34a":isPast?"#be123c":"#64748b",marginTop:2}}>{done?`✓ Hotovo • ${task.date}`:isToday2?"📅 Dnes":isPast?`⚠️ Prošlé – ${task.date}`:`📅 ${task.date}`}</div>
                          </div>
                          <span style={{fontSize:11,background:cat.bg,color:cat.text,border:`1px solid ${cat.border}`,borderRadius:10,padding:"2px 8px",fontWeight:600,flexShrink:0}}>{cat.label}</span>
                          <button onClick={()=>deleteTask(task.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16,padding:"0 4px",flexShrink:0}}>🗑</button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {doneSorted.length>0&&(
              <div style={{marginBottom:20}}>
                <div onClick={()=>setShowDone(s=>!s)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,cursor:"pointer"}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#94a3b8"}}>{showDone?"▾":"▸"} ✓ Zpracované úkoly ({doneSorted.length})</div>
                </div>
                {showDone&&(
                  <div style={{background:"#f8fafc",borderRadius:14,padding:20,border:"1px dashed #cbd5e1"}}>
                    {doneSorted.map(task=>{
                      const cat=CAT[task.category]||CAT["účetnictví"];
                      return(
                        <div key={task.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:8,background:"#f0fdf4",border:"1px solid #bbf7d0",marginBottom:6,opacity:0.75}}>
                          <div onClick={()=>toggleTask(task.id)} style={{width:22,height:22,borderRadius:6,border:"2px solid #16a34a",background:"#16a34a",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer"}}>
                            <span style={{color:"white",fontSize:13,lineHeight:1}}>✓</span>
                          </div>
                          <div style={{flex:1,cursor:"pointer"}} onClick={()=>toggleTask(task.id)}>
                            <div style={{fontSize:14,fontWeight:600,color:"#15803d",textDecoration:"line-through"}}>{task.title}</div>
                            <div style={{fontSize:11,color:"#16a34a",marginTop:2}}>✓ Hotovo • {task.date}</div>
                          </div>
                          <span style={{fontSize:11,background:cat.bg,color:cat.text,border:`1px solid ${cat.border}`,borderRadius:10,padding:"2px 8px",fontWeight:600,flexShrink:0}}>{cat.label}</span>
                          <button onClick={()=>deleteTask(task.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16,padding:"0 4px",flexShrink:0}}>🗑</button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })()}

      <div style={{textAlign:"center",padding:"20px 16px",fontSize:11,color:"#94a3b8",borderTop:"1px solid #e2eaf2",marginTop:16}}>
        Fineko Daně • Účetní diář {cy} • Data uložena v databázi
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
